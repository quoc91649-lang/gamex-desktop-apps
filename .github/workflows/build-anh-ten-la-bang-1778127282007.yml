name: Build Desktop App - anh ten la bang

on:
  push:
    paths:
      - 'apps/anh-ten-la-bang-1778127282007/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-exe:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: apps/anh-ten-la-bang-1778127282007
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          if (Test-Path "requirements.txt") { pip install -r requirements.txt }
        shell: pwsh

      - name: Build .exe with PyInstaller
        working-directory: apps/anh-ten-la-bang-1778127282007
        run: pyinstaller --onefile --windowed --name "anh-ten-la-bang" main.py
        shell: pwsh

      - name: Get version
        id: version
        run: echo "version=1.0.${{ github.run_number }}" >> ${{ env.GITHUB_OUTPUT }}
        shell: pwsh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "anh-ten-la-bang-v${{ steps.version.outputs.version }}"
          name: "anh ten la bang v${{ steps.version.outputs.version }}"
          files: apps/anh-ten-la-bang-1778127282007/dist/anh-ten-la-bang.exe
          body: |
            ## anh ten la bang
            Auto-built from source by GameX platform.
            ### Cài đặt
            1. Tải file .exe về
            2. Double-click để chạy
            3. Nếu Windows SmartScreen cảnh báo, chọn "More info" → "Run anyway"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update build status
        if: always()
        run: |
          $status = if ("${{ job.status }}" -eq "success") { "success" } else { "failed" }
          $body = @{ app_id = "apps/anh-ten-la-bang-1778127282007"; status = $status; run_id = "${{ github.run_id }}"; tag = "anh-ten-la-bang-v${{ steps.version.outputs.version }}" } | ConvertTo-Json
          try { Invoke-RestMethod -Uri "${{ vars.GAMEX_WEBHOOK_URL }}/api/desktop-build-webhook" -Method POST -Body $body -ContentType "application/json" } catch { Write-Host "Webhook failed: $_" }
        shell: pwsh