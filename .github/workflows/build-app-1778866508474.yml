name: Build Desktop App - APP
on:
  push:
    paths:
      - 'apps/app-1778866508474/**'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: windows
            ext: .exe
          - os: macos-latest
            platform: macos
            ext: ""
          - os: ubuntu-latest
            platform: linux
            ext: ""
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install PyInstaller
        run: pip install pyinstaller
      - name: Install dependencies (unix)
        if: matrix.platform != 'windows'
        working-directory: apps/app-1778866508474
        run: |
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        shell: bash
      - name: Install dependencies (windows)
        if: matrix.platform == 'windows'
        working-directory: apps/app-1778866508474
        run: |
          if (Test-Path "requirements.txt") { pip install -r requirements.txt }
        shell: pwsh
      - name: Build (linux)
        if: matrix.platform == 'linux'
        working-directory: apps/app-1778866508474
        run: |
          # Try to include assets if folders exist
          ADD_DATA=""
          if [ -d "assets" ]; then ADD_DATA="$ADD_DATA --add-data assets:assets"; fi
          if [ -d "images" ]; then ADD_DATA="$ADD_DATA --add-data images:images"; fi
          pyinstaller --onefile --windowed --name "app" $ADD_DATA main.py
      - name: Build (windows)
        if: matrix.platform == 'windows'
        working-directory: apps/app-1778866508474
        run: |
          $ADD_DATA = ""
          if (Test-Path "assets") { $ADD_DATA += " --add-data assets;assets" }
          if (Test-Path "images") { $ADD_DATA += " --add-data images;images" }
          pyinstaller --onefile --windowed --name "app" $ADD_DATA main.py
        shell: pwsh
      - name: Build (macos)
        if: matrix.platform == 'macos'
        working-directory: apps/app-1778866508474
        run: |
          ADD_DATA=""
          if [ -d "assets" ]; then ADD_DATA="$ADD_DATA --add-data assets:assets"; fi
          if [ -d "images" ]; then ADD_DATA="$ADD_DATA --add-data images:images"; fi
          pyinstaller --onefile --windowed --name "app" $ADD_DATA main.py
          cd dist && zip -r "app-macos.zip" "app.app" || zip -r "app-macos.zip" "app"
      - uses: actions/upload-artifact@v4
        with:
          name: app-${{ matrix.platform }}
          path: |
            apps/app-1778866508474/dist/app.exe
            apps/app-1778866508474/dist/app-macos.zip
            apps/app-1778866508474/dist/app
          if-no-files-found: warn
  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - id: version
        run: echo "version=1.0.${{ github.run_number }}" >> $GITHUB_OUTPUT
      - uses: actions/download-artifact@v4
        with:
          path: dist/
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: "app-v${{ steps.version.outputs.version }}"
          name: "APP v${{ steps.version.outputs.version }}"
          files: dist/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Notify webhook
        if: always()
        run: |
          STATUS="${{ job.status }}"
          if [ "$STATUS" = "success" ]; then RESULT="success"; else RESULT="failed"; fi
          curl -s -X POST "${{ vars.GAMEX_WEBHOOK_URL }}/api/desktop-build-webhook" \
            -H "Content-Type: application/json" \
            -d "{\"app_id\":\"apps/app-1778866508474\",\"status\":\"$RESULT\",\"run_id\":\"${{ github.run_id }}\",\"tag\":\"app-v${{ steps.version.outputs.version }}\"}" || true