name: Build Desktop App - asdasdas
on:
  push:
    paths:
      - 'apps/asdasdas-1778641430062/**'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: windows
            ext: .exe
          - os: macos-latest
            platform: macos
            ext: ""
          - os: ubuntu-latest
            platform: linux
            ext: ""
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install deps (unix)
        if: matrix.platform != 'windows'
        working-directory: apps/asdasdas-1778641430062
        run: |
          pip install pyinstaller
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        shell: bash
      - name: Install deps (windows)
        if: matrix.platform == 'windows'
        working-directory: apps/asdasdas-1778641430062
        run: |
          pip install pyinstaller
          if (Test-Path "requirements.txt") { pip install -r requirements.txt }
        shell: pwsh
      - name: Build (linux)
        if: matrix.platform == 'linux'
        working-directory: apps/asdasdas-1778641430062
        run: pyinstaller --onefile --windowed --name "asdasdas" main.py
      - name: Build (windows)
        if: matrix.platform == 'windows'
        working-directory: apps/asdasdas-1778641430062
        run: pyinstaller --onefile --windowed --name "asdasdas" main.py
        shell: pwsh
      - name: Build (macos)
        if: matrix.platform == 'macos'
        working-directory: apps/asdasdas-1778641430062
        run: |
          pyinstaller --onefile --windowed --name "asdasdas" main.py
          cd dist && zip -r "asdasdas-macos.zip" "asdasdas.app" || zip -r "asdasdas-macos.zip" "asdasdas"
      - uses: actions/upload-artifact@v4
        with:
          name: asdasdas-${{ matrix.platform }}
          path: |
            apps/asdasdas-1778641430062/dist/asdasdas.exe
            apps/asdasdas-1778641430062/dist/asdasdas-macos.zip
            apps/asdasdas-1778641430062/dist/asdasdas
          if-no-files-found: warn
  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - id: version
        run: echo "version=1.0.${{ github.run_number }}" >> $GITHUB_OUTPUT
      - uses: actions/download-artifact@v4
        with:
          path: dist/
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: "asdasdas-v${{ steps.version.outputs.version }}"
          name: "asdasdas v${{ steps.version.outputs.version }}"
          files: dist/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Notify webhook
        if: always()
        run: |
          STATUS="${{ job.status }}"
          if [ "$STATUS" = "success" ]; then RESULT="success"; else RESULT="failed"; fi
          curl -s -X POST "${{ vars.GAMEX_WEBHOOK_URL }}/api/desktop-build-webhook" \
            -H "Content-Type: application/json" \
            -d "{\"app_id\":\"apps/asdasdas-1778641430062\",\"status\":\"$RESULT\",\"run_id\":\"${{ github.run_id }}\",\"tag\":\"asdasdas-v${{ steps.version.outputs.version }}\"}" || true